pre-commit:
    commands:
        type-check:
            run: npm run type-check
        oxlint:
            glob: '*.{ts,js}'
            run: npx oxlint --fix {staged_files}
            stage_fixed: true
        oxfmt:
            run: npx oxfmt --no-error-on-unmatched-pattern {staged_files}
            stage_fixed: true

pre-push:
    commands:
        test:
            run: npm test
