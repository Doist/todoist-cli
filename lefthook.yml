pre-commit:
    commands:
        type-check:
            run: npm run type-check
        biome:
            glob: '*.{ts,js,json}'
            run: npx biome lint --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
            stage_fixed: true
        oxfmt:
            run: npx oxfmt --no-error-on-unmatched-pattern {staged_files}
            stage_fixed: true

pre-push:
    commands:
        test:
            run: npm test
